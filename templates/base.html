<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Scientific Data Portal{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}A structured knowledge system for scientific data formats, tools, and workflows.{% endblock %}">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header>
        <nav>
            <a href="{% url 'home' %}">SciData Portal</a>
            <ul>
                <li><a href="{% url 'content:browse' %}">Browse</a></li>
                <li><a href="{% url 'content:browse' %}?type=data_format">Formats</a></li>
                <li><a href="{% url 'content:browse' %}?type=software_tool">Tools</a></li>
                <li><a href="{% url 'content:browse' %}?type=data_source">Repositories</a></li>
                <li><a href="{% url 'content:browse' %}?type=workflow">Workflows</a></li>
                <li><a href="{% url 'content:browse' %}?type=concept_guide">Concepts</a></li>
            </ul>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>Scientific Data Portal &mdash; FAIR &middot; DataCite 4.7 &middot; W3C PROV</p>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
